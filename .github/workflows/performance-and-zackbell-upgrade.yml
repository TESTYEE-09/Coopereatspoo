name: Apply performance and Zackbell upgrade

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/performance-and-zackbell-upgrade.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Patch game
        run: |
          python <<'PY'
          from pathlib import Path
          import re

          p = Path('game.js')
          s = p.read_text()

          replacements = {
            "this.maxPixelRatio = this.quality === 'HIGH' ? 1.35 : this.quality === 'MEDIUM' ? 1.1 : .85;": "this.maxPixelRatio = this.quality === 'HIGH' ? 1.15 : this.quality === 'MEDIUM' ? .92 : .7;",
            "this.renderer = new THREE.WebGLRenderer({ canvas: this.canvas, antialias: this.quality !== 'LOW', powerPreference: 'high-performance' });": "this.renderer = new THREE.WebGLRenderer({ canvas: this.canvas, antialias: this.quality === 'HIGH', powerPreference: 'high-performance', precision: 'mediump', stencil: false });",
            "this.renderer.shadowMap.enabled = this.quality !== 'LOW';": "this.renderer.shadowMap.enabled = this.quality === 'HIGH';",
            "this.renderer.shadowMap.type = this.quality === 'HIGH' ? THREE.PCFSoftShadowMap : THREE.PCFShadowMap;": "this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;",
            "this.avgFps = 60;": "this.avgFps = 60;\n    this.performanceReduced = false;",
            "const shadowSize = this.quality === 'HIGH' ? 1024 : 512;": "const shadowSize = 768;",
            "const caps=[5,6,7,7],cap=this.quality==='LOW'?Math.max(4,caps[this.chapter]-1):caps[this.chapter];": "const caps=[5,6,7,7],cap=this.quality==='LOW'?Math.max(3,caps[this.chapter]-2):this.quality==='MEDIUM'?Math.max(4,caps[this.chapter]-1):caps[this.chapter];",
            "if(this.projectiles.length>(this.quality==='LOW'?22:34))return;": "if(this.projectiles.length>(this.quality==='LOW'?14:this.quality==='MEDIUM'?22:30))return;",
            "const n=this.quality==='LOW'?Math.min(count,6):Math.min(count,24);if(!n)return;": "const n=this.quality==='LOW'?Math.min(count,4):this.quality==='MEDIUM'?Math.min(count,10):Math.min(count,18);if(!n)return;",
            "tracer(from,to){const geometry=new THREE.BufferGeometry().setFromPoints([from,to]);": "tracer(from,to){if(this.fx.length>(this.quality==='LOW'?10:20))return;const geometry=new THREE.BufferGeometry().setFromPoints([from,to]);",
            "if(this.avgFps<42&&this.pixelRatio>.65){this.pixelRatio=Math.max(.65,this.pixelRatio-.1);this.renderer.setPixelRatio(this.pixelRatio);this.resize();}": "if(this.avgFps<48&&this.pixelRatio>.55){this.pixelRatio=Math.max(.55,this.pixelRatio-.12);this.renderer.setPixelRatio(this.pixelRatio);if(!this.performanceReduced){this.performanceReduced=true;this.renderer.shadowMap.enabled=false;}this.resize();}",
            "else if(this.avgFps>57&&this.pixelRatio<this.maxPixelRatio){this.pixelRatio=Math.min(this.maxPixelRatio,this.pixelRatio+.05);": "else if(this.avgFps>58&&this.pixelRatio<this.maxPixelRatio){this.pixelRatio=Math.min(this.maxPixelRatio,this.pixelRatio+.035);"
          }
          for old, new in replacements.items():
            if old not in s:
              raise SystemExit(f'Missing expected text: {old[:80]}')
            s = s.replace(old, new, 1)

          old_loop = """for(const enemy of [...this.enemies]){\n      if(enemy.dead)continue;\n      const p=enemy.mesh.position;\n      const dir=this.tmpA.copy(this.player.position).sub(p);const dist=Math.max(.001,dir.length());dir.multiplyScalar(1/dist);enemy.attack-=dt;"""
          new_loop = """for(let enemyIndex=this.enemies.length-1;enemyIndex>=0;enemyIndex--){\n      const enemy=this.enemies[enemyIndex];\n      if(enemy.dead)continue;\n      const p=enemy.mesh.position;\n      const dir=this.tmpA.copy(this.player.position).sub(p);const dist=Math.max(.001,dir.length());dir.multiplyScalar(1/dist);enemy.attack-=dt;"""
          if old_loop not in s: raise SystemExit('Enemy loop signature missing')
          s = s.replace(old_loop, new_loop, 1)
          s = s.replace("enemy.mesh.rotation.y=Math.atan2(dir.x,dir.z)+Math.PI;enemy.mesh.position.y=Math.sin(time+this.enemies.indexOf(enemy))*.08;", "enemy.mesh.rotation.y=Math.atan2(dir.x,dir.z)+Math.PI;enemy.mesh.position.y=Math.sin(time+enemyIndex)*.08;", 1)

          start = s.index('  createRifle() {')
          end = s.index('\n\n  bindEvents()', start)
          rifle = '''  createRifle() {
    const g = new THREE.Group();
    const add = (geometry, material, x, y, z, rx=0, ry=0, rz=0) => {
      const mesh = new THREE.Mesh(geometry, material);
      mesh.position.set(x,y,z); mesh.rotation.set(rx,ry,rz); g.add(mesh); return mesh;
    };
    add(new THREE.BoxGeometry(.42,.32,1.02),this.materials.gunmetal,0,0,-.48);
    add(new THREE.BoxGeometry(.34,.27,.9),this.materials.ink,0,.01,-1.42);
    for(let z=-1.08;z>-1.82;z-=.18) add(new THREE.BoxGeometry(.38,.045,.09),this.materials.steel,0,.165,z);
    add(new THREE.CylinderGeometry(.058,.058,1.38,10),this.materials.steel,0,.01,-2.18,Math.PI/2);
    add(new THREE.CylinderGeometry(.105,.085,.36,10),this.materials.gunmetal,0,.01,-2.98,Math.PI/2);
    for(const x of [-.085,.085]) add(new THREE.BoxGeometry(.045,.1,.22),this.materials.ink,x,.01,-3.02);
    add(new THREE.BoxGeometry(.39,.4,.72),this.materials.rubber,0,.015,.58,-.1);
    add(new THREE.BoxGeometry(.25,.23,.48),this.materials.gunmetal,0,.03,.2);
    add(new THREE.BoxGeometry(.18,.52,.23),this.materials.rubber,0,-.36,-.08,-.28);
    add(new THREE.BoxGeometry(.25,.56,.34),this.materials.gunmetal,0,-.42,-.58,.18);
    add(new THREE.BoxGeometry(.2,.34,.18),this.materials.rubber,0,-.29,-1.38,-.15);
    add(new THREE.BoxGeometry(.28,.055,1.1),this.materials.steel,0,.235,-.56);
    add(new THREE.CylinderGeometry(.18,.18,.5,12),this.materials.gunmetal,0,.41,-.62,Math.PI/2);
    const lensMat = new THREE.MeshPhysicalMaterial({color:0x66d8ff,roughness:.05,metalness:.12,transparent:true,opacity:.8});
    add(new THREE.CylinderGeometry(.145,.145,.035,12),lensMat,0,.41,-.89,Math.PI/2);
    add(new THREE.CylinderGeometry(.12,.12,.035,12),lensMat,0,.41,-.34,Math.PI/2);
    add(new THREE.TorusGeometry(.16,.025,6,14),this.materials.gunmetal,0,-.16,-.1,Math.PI/2);
    add(new THREE.BoxGeometry(.08,.08,.34),this.materials.steel,.24,.08,-.18);
    add(new THREE.BoxGeometry(.13,.13,.5),this.materials.cyan,.22,.02,-.53);
    add(new THREE.BoxGeometry(.07,.17,.08),this.materials.steel,0,.31,-1.86);
    add(new THREE.BoxGeometry(.07,.13,.08),this.materials.steel,0,.29,-.12);
    this.muzzle = new THREE.Object3D(); this.muzzle.position.set(0,.01,-3.2);
    this.muzzleFlash = new THREE.Mesh(new THREE.ConeGeometry(.18,.58,8),new THREE.MeshBasicMaterial({color:0xffd56a,transparent:true,opacity:0,depthWrite:false}));
    this.muzzleFlash.rotation.x=-Math.PI/2; this.muzzleFlash.position.set(0,.01,-3.26);
    g.add(this.muzzle,this.muzzleFlash);
    g.scale.setScalar(.92);
    g.traverse((o)=>{if(o.isMesh)o.castShadow=this.quality==='HIGH';});
    return g;
  }'''
          s = s[:start] + rifle + s[end:]

          # Make Zackbell's phase three stink ring cheaper but more distinctive.
          old = "else for(let a=0;a<10;a++)this.enemyShoot(enemy,new THREE.Vector3(Math.sin(a*TAU/10),0,-Math.cos(a*TAU/10)),0x75b84d,1.35);enemy.attack=enemy.phase===3?.72:1.05;"
          new = "else for(let a=0;a<(this.quality==='LOW'?6:8);a++)this.enemyShoot(enemy,new THREE.Vector3(Math.sin(a*TAU/(this.quality==='LOW'?6:8)),0,-Math.cos(a*TAU/(this.quality==='LOW'?6:8))),0x75b84d,1.35);enemy.attack=enemy.phase===3?.82:1.05;"
          if old not in s: raise SystemExit('Zackbell attack signature missing')
          s = s.replace(old,new,1)

          p.write_text(s)
          PY
      - name: Commit upgrade
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add game.js
          git commit -m "Optimize game and upgrade Zackbell boss" || exit 0
          git push origin main
