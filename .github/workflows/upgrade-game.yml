name: Upgrade story game

on:
  push:
    branches: [main]
    paths:
      - tools/upgrade_game.py
      - .github/workflows/upgrade-game.yml

permissions:
  contents: write

jobs:
  upgrade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply upgrade
        run: python tools/upgrade_game.py

      - name: Validate JavaScript
        run: node --check game.js

      - name: Validate diff
        run: git diff --check

      - name: Commit upgraded game
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add game.js index.html README.md
          if git diff --cached --quiet; then
            echo "No upgrade changes were produced."
            exit 0
          fi
          git commit -m "Optimize 3D game and add Zackbell boss"
          git push origin main
